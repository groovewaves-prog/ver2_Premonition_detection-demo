# config/degradation_scenarios.yaml
# 劣化シナリオ定義ファイル
#
# Phase 1: optical, microburst, memory_leak（実装済み）
# Phase 2: cpu_overload, link_flapping, bgp_instability, power_thermal（将来追加）
#
# 新しいシナリオを追加するには、このファイルにエントリを追加するだけで
# Pythonコードの変更なしに利用可能になります。

scenarios:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 1: 実装済みシナリオ
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  optical:
    display_name: "Optical Decay (光減衰進行)"
    display_name_short: "Optical Decay (光減衰)"
    category: "Hardware/Optical"
    metric_name: "Rx Power"
    metric_unit: "dBm"
    normal_value: -8.0
    failure_value: -25.0
    default_interfaces: ["Gi0/0/1", "Gi0/0/2", "Te1/0/1"]
    enabled: true
    phase: 1
    stages:
      - level: 1
        label: "初期劣化"
        duration_sec: 10.0
        metric_value: -18.5
        severity: "WARNING"
        color: "#FFC107"
        alarm_templates:
          - "%TRANSCEIVER-4-THRESHOLD_VIOLATION: Rx Power {value:.1f} dBm on {intf} (optical signal degrading). transceiver rx power below threshold."
      - level: 2
        label: "劣化進行"
        duration_sec: 8.0
        metric_value: -20.2
        severity: "WARNING"
        color: "#FF9800"
        alarm_templates:
          - "%TRANSCEIVER-4-THRESHOLD_VIOLATION: Rx Power {value:.1f} dBm on {intf} (optical signal degrading). transceiver rx power below threshold."
          - "%OPTICAL-3-SIGNAL_WARN: optical signal level degrading on {intf}. light level {value:.1f} dBm. transceiver rx power loss detected."
      - level: 3
        label: "警戒域"
        duration_sec: 6.0
        metric_value: -22.0
        severity: "WARNING"
        color: "#FF5722"
        alarm_templates:
          - "%TRANSCEIVER-3-THRESHOLD_VIOLATION: Rx Power {value:.1f} dBm on {intf} (CRITICAL). transceiver rx power below threshold."
          - "%OPTICAL-3-SIGNAL_WARN: optical signal level degrading on {intf}. light level {alt_value:.1f} dBm. transceiver rx power loss detected."
          - "%LINK-3-UPDOWN: Interface {intf}, changed state to down (intermittent)"
      - level: 4
        label: "危険域"
        duration_sec: 5.0
        metric_value: -23.5
        severity: "CRITICAL"
        color: "#D32F2F"
        alarm_templates:
          - "%TRANSCEIVER-2-THRESHOLD_VIOLATION: Rx Power {value:.1f} dBm on {intf} (CRITICAL). transceiver rx power critical low."
          - "%OPTICAL-2-SIGNAL_FAIL: optical signal LOSS on {intf}. light level {value:.1f} dBm."
          - "%LINK-3-UPDOWN: Interface {intf}, changed state to down"
          - "%LINEPROTO-5-UPDOWN: Line protocol on Interface {intf}, changed state to down"
      - level: 5
        label: "障害直前"
        duration_sec: 3.0
        metric_value: -25.0
        severity: "CRITICAL"
        color: "#B71C1C"
        alarm_templates:
          - "%TRANSCEIVER-1-THRESHOLD_VIOLATION: Rx Power {value:.1f} dBm on {intf} (EMERGENCY). transceiver FAILURE imminent."
          - "%OPTICAL-1-SIGNAL_FAIL: optical signal LOSS on {intf}. NO LIGHT DETECTED."
          - "%LINK-2-UPDOWN: Interface {intf}, changed state to down (PERMANENT)"
          - "%LINEPROTO-2-UPDOWN: Line protocol on Interface {intf}, changed state to down"
          - "%SYS-1-LINK_FAIL: Multiple interface failures detected. Cascade risk HIGH."

  microburst:
    display_name: "Microburst (パケット破棄増加)"
    display_name_short: "Microburst (パケット破棄)"
    category: "Network/QoS"
    metric_name: "Queue Drops"
    metric_unit: "drops/s"
    normal_value: 0.0
    failure_value: 5000.0
    default_interfaces: ["Gi0/1/0", "Gi0/1/1", "Gi0/1/2"]
    enabled: true
    phase: 1
    stages:
      - level: 1
        label: "初期兆候"
        duration_sec: 8.0
        metric_value: 200.0
        severity: "WARNING"
        color: "#FFC107"
        alarm_templates:
          - "%HARDWARE-3-ASIC_ERROR: asic_error queue drops detected on {intf} (Count: {value:.0f}). output drops on burst traffic."
      - level: 2
        label: "バースト増加"
        duration_sec: 7.0
        metric_value: 600.0
        severity: "WARNING"
        color: "#FF9800"
        alarm_templates:
          - "%HARDWARE-3-ASIC_ERROR: asic_error queue drops detected on {intf} (Count: {value:.0f}). output drops on burst traffic."
          - "%QOS-4-BUFFER: buffer overflow risk on {intf}. queue drops {value:.0f}/sec. output drops increasing."
      - level: 3
        label: "バッファ圧迫"
        duration_sec: 5.0
        metric_value: 1500.0
        severity: "WARNING"
        color: "#FF5722"
        alarm_templates:
          - "%HARDWARE-2-ASIC_ERROR: asic_error queue drops CRITICAL on {intf} (Count: {value:.0f}). buffer near exhaustion."
          - "%QOS-3-POLICER: Traffic policing activated on {intf}. drops {value:.0f}/sec."
          - "%PLATFORM-3-ELEMENT_WARNING: High CPU usage during burst processing."
      - level: 4
        label: "バッファ枯渇"
        duration_sec: 4.0
        metric_value: 3000.0
        severity: "CRITICAL"
        color: "#D32F2F"
        alarm_templates:
          - "%HARDWARE-1-ASIC_ERROR: asic_error CRITICAL on {intf}. Buffer EXHAUSTED (Count: {value:.0f})."
          - "%QOS-2-BUFFER_EXHAUSTED: ALL buffers consumed on {intf}. Packet loss imminent."
          - "%PLATFORM-2-ELEMENT_CRITICAL: System stability at risk. Memory pressure HIGH."
          - "%SYS-3-CPUHOG: CPU utilization exceeded threshold during burst."
      - level: 5
        label: "サービス断"
        duration_sec: 3.0
        metric_value: 5000.0
        severity: "CRITICAL"
        color: "#B71C1C"
        alarm_templates:
          - "%HARDWARE-0-ASIC_FAIL: ASIC failure on {intf}. ALL packets dropped."
          - "%QOS-1-BUFFER_FAIL: Buffer allocation failure. Service DISRUPTED."
          - "%LINK-2-UPDOWN: Interface {intf}, changed state to down (buffer exhaustion)"
          - "%SYS-1-SERVICE_DISRUPTED: Service disruption detected. Multiple interfaces affected."
          - "%PLATFORM-1-CRASH_IMMINENT: System crash risk. Emergency action required."

  memory_leak:
    display_name: "Memory Leak (メモリ枯渇進行)"
    display_name_short: "Memory Leak (メモリリーク)"
    category: "Software/Resource"
    metric_name: "Memory Usage"
    metric_unit: "%"
    normal_value: 45.0
    failure_value: 98.0
    default_interfaces: ["System"]
    enabled: true
    phase: 1
    stages:
      - level: 1
        label: "使用率上昇"
        duration_sec: 12.0
        metric_value: 72.0
        severity: "WARNING"
        color: "#FFC107"
        alarm_templates:
          - "%SYS-4-MEMORY_WARN: High memory usage detected. Processor Pool Free: {free}M. Potential memory leak."
      - level: 2
        label: "リーク加速"
        duration_sec: 10.0
        metric_value: 80.0
        severity: "WARNING"
        color: "#FF9800"
        alarm_templates:
          - "%SYS-4-MEMORY_WARN: High memory usage detected. Processor Pool Free: {free}M. Potential memory leak."
          - "%PLATFORM-3-ELEMENT_WARNING: Used Memory value {value:.0f}% exceeds warning threshold. System instability risk."
      - level: 3
        label: "高使用率"
        duration_sec: 8.0
        metric_value: 88.0
        severity: "WARNING"
        color: "#FF5722"
        alarm_templates:
          - "%SYS-3-MEMORY_CRITICAL: Memory usage {value:.0f}%. Free: {free}M. Process instability likely."
          - "%PLATFORM-2-ELEMENT_CRITICAL: Used Memory value {value:.0f}% exceeds critical threshold."
          - "%SYS-3-CPUHOG: CPU utilization high due to memory pressure. GC cycles increasing."
      - level: 4
        label: "枯渇域"
        duration_sec: 6.0
        metric_value: 94.0
        severity: "CRITICAL"
        color: "#D32F2F"
        alarm_templates:
          - "%SYS-2-MALLOCFAIL: Memory allocation of 65536 bytes failed. Pool: Processor, Free: {free}M."
          - "%SYS-2-MEMORY_CRITICAL: Memory usage {value:.0f}%. System UNSTABLE."
          - "%PLATFORM-1-ELEMENT_CRITICAL: Used Memory value {value:.0f}%. CRASH imminent."
          - "%SYS-2-WATCHDOG: Process restart triggered by memory exhaustion."
      - level: 5
        label: "クラッシュ直前"
        duration_sec: 4.0
        metric_value: 98.0
        severity: "CRITICAL"
        color: "#B71C1C"
        alarm_templates:
          - "%SYS-1-MALLOCFAIL: CRITICAL memory allocation failure. Pool: Processor EMPTY."
          - "%SYS-0-MEMORY_EXHAUSTED: ALL memory pools exhausted. System CRASH imminent."
          - "%PLATFORM-0-CRASH: System crash due to memory exhaustion. Reboot required."
          - "%SYS-1-SERVICE_DISRUPTED: Multiple services failed. Emergency reload needed."
          - "%SYS-0-FATAL: Unrecoverable memory state. Automatic reload in 60 seconds."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 1: トラフィック輻輳シナリオ（PHM: トラフィックティア）
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  traffic_congestion:
    display_name: "Traffic Congestion (帯域輻輳進行)"
    display_name_short: "Traffic (帯域輻輳)"
    category: "Network/Bandwidth"
    metric_name: "Link Utilization"
    metric_unit: "%"
    normal_value: 35.0
    failure_value: 99.0
    default_interfaces: ["Gi0/0/1", "Gi0/0/2", "Gi0/0/3"]
    enabled: true
    phase: 1
    stages:
      - level: 1
        label: "通常増加"
        duration_sec: 12.0
        metric_value: 55.0
        severity: "INFO"
        color: "#FFC107"
        alarm_templates:
          - "%LINK-5-UTILIZATION: Interface {intf} utilization {value:.0f}% (normal increase). bandwidth usage rising."
      - level: 2
        label: "混雑開始"
        duration_sec: 10.0
        metric_value: 70.0
        severity: "WARNING"
        color: "#FF9800"
        alarm_templates:
          - "%LINK-4-UTILIZATION: Interface {intf} utilization {value:.0f}% (congestion starting). bandwidth exceeded 70% threshold."
          - "%QOS-4-POLICER: Traffic policing activated on {intf}. output drops increasing due to congestion."
      - level: 3
        label: "輻輳"
        duration_sec: 7.0
        metric_value: 85.0
        severity: "WARNING"
        color: "#FF5722"
        alarm_templates:
          - "%LINK-3-UTILIZATION: Interface {intf} utilization {value:.0f}% (congested). bandwidth exceeded 85% threshold."
          - "%QOS-3-BUFFER: buffer pressure on {intf}. queue depth increasing. output drops {value:.0f}/sec."
          - "%SYS-4-PERFORMANCE: High throughput detected. CPU utilization elevated due to packet processing."
      - level: 4
        label: "帯域逼迫"
        duration_sec: 5.0
        metric_value: 93.0
        severity: "CRITICAL"
        color: "#D32F2F"
        alarm_templates:
          - "%LINK-2-UTILIZATION: Interface {intf} utilization {value:.0f}% (CRITICAL). bandwidth near saturation."
          - "%QOS-2-BUFFER_EXHAUSTED: buffer exhaustion imminent on {intf}. packet loss detected."
          - "%PLATFORM-3-ELEMENT_WARNING: Interface {intf} throughput exceeding design capacity."
          - "%SYS-3-CPUHOG: CPU utilization exceeded threshold during high traffic volume."
      - level: 5
        label: "飽和"
        duration_sec: 3.0
        metric_value: 99.0
        severity: "CRITICAL"
        color: "#B71C1C"
        alarm_templates:
          - "%LINK-1-UTILIZATION: Interface {intf} utilization {value:.0f}% (SATURATED). bandwidth EXHAUSTED."
          - "%QOS-1-BUFFER_FAIL: ALL buffers consumed on {intf}. Massive packet loss."
          - "%PLATFORM-1-ELEMENT_CRITICAL: Interface {intf} capacity exceeded. Service degradation imminent."
          - "%SYS-1-SERVICE_DISRUPTED: Multiple services affected by bandwidth saturation."
          - "%LINK-2-UPDOWN: Interface {intf}, changed state to err-disabled (traffic overload)"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 1: CRC/FCSエラー（物理層劣化の先行指標）
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  crc_fcs_error:
    display_name: "CRC/FCS Error (物理回線劣化)"
    display_name_short: "CRC/FCS Error (物理回線劣化)"
    category: "Hardware/Physical"
    metric_name: "CRC Error Rate"
    metric_unit: "%"
    normal_value: 0.0
    failure_value: 8.0
    default_interfaces: ["Gi0/0/1", "Gi0/0/2", "Gi0/0/3"]
    enabled: true
    phase: 1
    stages:
      - level: 1
        label: "散発エラー"
        duration_sec: 10.0
        metric_value: 0.3
        severity: "WARNING"
        color: "#FFC107"
        alarm_templates:
          - "%LINK-4-CRC_THRESHOLD: CRC error rate {value:.2f}% on {intf}. input errors increasing. fcs error detected."
      - level: 2
        label: "エラー率上昇"
        duration_sec: 8.0
        metric_value: 1.0
        severity: "WARNING"
        color: "#FF9800"
        alarm_templates:
          - "%LINK-4-CRC_THRESHOLD: CRC error rate {value:.2f}% on {intf}. input errors increasing. fcs error detected."
          - "%INTERFACE-3-ERR_COUNTER: Input errors rising on {intf}. crc error count {value:.0f}/min. Cable integrity suspect."
      - level: 3
        label: "再送多発"
        duration_sec: 6.0
        metric_value: 2.5
        severity: "WARNING"
        color: "#FF5722"
        alarm_templates:
          - "%LINK-3-CRC_CRITICAL: CRC error rate {value:.2f}% on {intf}. fcs error rate exceeds threshold."
          - "%INTERFACE-3-ERR_COUNTER: Input errors critical on {intf}. crc error count {value:.0f}/min."
          - "%SYS-4-PERFORMANCE: Retransmission rate elevated on {intf} due to frame errors."
      - level: 4
        label: "回線劣化"
        duration_sec: 5.0
        metric_value: 5.0
        severity: "CRITICAL"
        color: "#D32F2F"
        alarm_templates:
          - "%LINK-2-CRC_CRITICAL: CRC error rate {value:.2f}% on {intf}. LINK INTEGRITY COMPROMISED."
          - "%INTERFACE-2-ERR_CRITICAL: Excessive input errors on {intf}. fcs error rate {value:.1f}%."
          - "%LINK-3-UPDOWN: Interface {intf}, changed state to down (intermittent, CRC)"
          - "%LINEPROTO-3-UPDOWN: Line protocol on Interface {intf}, flapping due to frame errors"
      - level: 5
        label: "リンク断直前"
        duration_sec: 3.0
        metric_value: 8.0
        severity: "CRITICAL"
        color: "#B71C1C"
        alarm_templates:
          - "%LINK-1-CRC_FAIL: CRC error rate {value:.2f}% on {intf}. LINK FAILURE imminent."
          - "%INTERFACE-1-ERR_FATAL: Input errors on {intf} exceed recovery threshold. fcs error critical."
          - "%LINK-2-UPDOWN: Interface {intf}, changed state to err-disabled (excessive CRC errors)"
          - "%LINEPROTO-2-UPDOWN: Line protocol on Interface {intf}, changed state to down"
          - "%SYS-1-LINK_FAIL: Physical layer degradation on {intf}. Cable/SFP replacement required."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 1: 遅延/ジッター（QoS劣化の直接指標）
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  latency_jitter:
    display_name: "Latency/Jitter (遅延・ジッター増大)"
    display_name_short: "Latency/Jitter (遅延・ジッター)"
    category: "Network/QoS"
    metric_name: "RTT"
    metric_unit: "ms"
    normal_value: 2.0
    failure_value: 500.0
    default_interfaces: ["Gi0/0/1", "Gi0/0/2", "Te1/0/1"]
    enabled: true
    phase: 1
    stages:
      - level: 1
        label: "遅延微増"
        duration_sec: 10.0
        metric_value: 15.0
        severity: "WARNING"
        color: "#FFC107"
        alarm_templates:
          - "%IP-4-SLA_THRESHOLD: RTT {value:.0f}ms on {intf}. latency above baseline. jitter detected."
      - level: 2
        label: "ジッター発生"
        duration_sec: 8.0
        metric_value: 50.0
        severity: "WARNING"
        color: "#FF9800"
        alarm_templates:
          - "%IP-4-SLA_THRESHOLD: RTT {value:.0f}ms on {intf}. latency above threshold. jitter {alt_value:.0f}ms."
          - "%QOS-4-LATENCY: Latency spike detected on {intf}. round-trip time {value:.0f}ms. jitter variance high."
      - level: 3
        label: "遅延顕在化"
        duration_sec: 6.0
        metric_value: 150.0
        severity: "WARNING"
        color: "#FF5722"
        alarm_templates:
          - "%IP-3-SLA_CRITICAL: RTT {value:.0f}ms on {intf}. latency exceeds SLA threshold."
          - "%QOS-3-LATENCY: Sustained high latency on {intf}. round-trip time {value:.0f}ms. jitter {alt_value:.0f}ms."
          - "%SYS-4-PERFORMANCE: Application timeout risk. keepalive delay on {intf}."
      - level: 4
        label: "SLA違反"
        duration_sec: 5.0
        metric_value: 300.0
        severity: "CRITICAL"
        color: "#D32F2F"
        alarm_templates:
          - "%IP-2-SLA_VIOLATION: RTT {value:.0f}ms on {intf}. SLA VIOLATION. latency critical."
          - "%QOS-2-LATENCY_CRITICAL: Round-trip time {value:.0f}ms on {intf}. Service quality DEGRADED."
          - "%LINEPROTO-3-UPDOWN: Keepalive timeout on Interface {intf} (high latency)"
          - "%SYS-3-TIMEOUT: Protocol timeouts detected. BGP/OSPF holdtime at risk."
      - level: 5
        label: "通信不能"
        duration_sec: 3.0
        metric_value: 500.0
        severity: "CRITICAL"
        color: "#B71C1C"
        alarm_templates:
          - "%IP-1-SLA_FAIL: RTT {value:.0f}ms on {intf}. COMMUNICATION FAILURE."
          - "%QOS-1-LATENCY_FAIL: Round-trip time {value:.0f}ms. All real-time services DISRUPTED."
          - "%LINEPROTO-2-UPDOWN: Line protocol on Interface {intf}, changed state to down (timeout)"
          - "%SYS-1-SERVICE_DISRUPTED: Multiple protocol sessions lost due to excessive latency."
          - "%SYS-1-LINK_FAIL: Effective link failure on {intf}. Latency exceeds usable threshold."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 2: 将来追加シナリオ（enabled: false）
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  cpu_overload:
    display_name: "CPU Overload (CPU過負荷)"
    display_name_short: "CPU Overload (CPU過負荷)"
    category: "Software/Resource"
    metric_name: "CPU Usage"
    metric_unit: "%"
    normal_value: 15.0
    failure_value: 99.0
    default_interfaces: ["System"]
    enabled: false
    phase: 2
    stages: []  # Phase 2で定義

  link_flapping:
    display_name: "Link Flapping (リンクフラッピング)"
    display_name_short: "Link Flapping (リンク不安定)"
    category: "Physical/Link"
    metric_name: "Flap Count"
    metric_unit: "flaps/min"
    normal_value: 0.0
    failure_value: 30.0
    default_interfaces: ["Gi0/0/1", "Gi0/0/2"]
    enabled: false
    phase: 2
    stages: []

  bgp_instability:
    display_name: "BGP Instability (BGP不安定)"
    display_name_short: "BGP Instability (BGP不安定)"
    category: "Protocol/Routing"
    metric_name: "BGP Flaps"
    metric_unit: "flaps/hr"
    normal_value: 0.0
    failure_value: 50.0
    default_interfaces: ["BGP-Peer-1", "BGP-Peer-2"]
    enabled: false
    phase: 2
    stages: []

  power_thermal:
    display_name: "Power/Thermal (電源/温度異常)"
    display_name_short: "Power/Thermal (電源/温度)"
    category: "Hardware/Environment"
    metric_name: "Temperature"
    metric_unit: "C"
    normal_value: 35.0
    failure_value: 85.0
    default_interfaces: ["PSU-1", "PSU-2", "FAN-1"]
    enabled: false
    phase: 2
    stages: []
